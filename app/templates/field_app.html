<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wickham Roofing - Field App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        body {
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: contain;
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc; /* Tailwind slate-50 */
        }
        #signature-pad {
            /* Critical for drawing without scrolling the page */
            touch-action: none;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-slate-800 shadow-md py-4 px-6 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-tight text-blue-400">Truck Server</h1>
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col p-4 space-y-6 overflow-y-auto">
        
        <!-- Intake Form Container -->
        <section id="intake-form-container" class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700">
            <h2 class="text-xl font-bold text-slate-100 mb-4 border-b border-slate-700 pb-2">New Lead Intake</h2>
            <form id="intake-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Homeowner Name *</label>
                    <input type="text" id="intake-name" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Address Line 1 *</label>
                    <input type="text" id="intake-address" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">City *</label>
                        <input type="text" id="intake-city" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">State *</label>
                        <input type="text" id="intake-state" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Postal Code *</label>
                        <input type="text" id="intake-zip" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Phone *</label>
                        <input type="tel" id="intake-phone" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                    <input type="email" id="intake-email" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Insurer Name</label>
                        <input type="text" id="intake-insurer" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Claim Number</label>
                        <input type="text" id="intake-claim" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <button type="submit" id="intake-submit-btn" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold py-4 px-6 rounded-lg shadow-lg transition-colors">
                    Create Lead & Start Intake
                </button>
            </form>
        </section>

        <!-- SPA Actions Container (Hidden initially) -->
        <div id="job-actions-container" class="hidden space-y-6">
            
            <!-- Active Job Banner -->
            <div class="bg-indigo-900/50 border border-indigo-500/50 rounded-xl p-4 flex justify-between items-center">
                <div>
                    <p class="text-xs text-indigo-300 uppercase tracking-wide font-bold">Active Lead</p>
                    <p id="active-homeowner-name" class="text-lg font-bold text-white">...</p>
                </div>
                <p id="active-job-id" class="text-xs text-indigo-200 font-mono hidden md:block">...</p>
            </div>

            <!-- Camera Upload -->
        <section class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700 flex flex-col items-center">
            <div class="w-full flex justify-between items-end mb-4">
                <div>
                    <h2 class="text-lg font-bold text-slate-100">Photo Ingestion</h2>
                    <p class="text-sm text-slate-400">Queue: <span id="queue-count" class="font-mono font-bold text-blue-400">0</span> remaining</p>
                </div>
                <div id="upload-spinner" class="hidden animate-spin rounded-full h-6 w-6 border-b-2 border-blue-500"></div>
            </div>
            
            <input type="file" id="camera-input" accept="image/*" capture="environment" multiple class="hidden">
            <button id="camera-btn" class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold py-4 px-6 rounded-lg shadow-lg flex justify-center items-center space-x-2 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span class="text-lg">Open Camera</span>
            </button>
        </section>

        <!-- Signature Pad -->
        <section class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-100">Homeowner Signature</h2>
                <button id="clear-sig-btn" class="text-sm text-slate-400 hover:text-red-400 transition-colors">Clear</button>
            </div>
            
            <div class="bg-slate-50 rounded-lg overflow-hidden border-2 border-slate-600 relative">
                <!-- Canvas dimension set by JS for retina scaling -->
                <canvas id="signature-pad" class="w-full h-48 cursor-crosshair"></canvas>
            </div>
            
            <button id="submit-sig-btn" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-bold py-4 px-6 rounded-lg shadow-lg flex justify-center items-center space-x-2 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-lg">Submit Agreement</span>
            </button>
        </section>

        </div> <!-- End SPA Actions Container -->

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800 border border-slate-600 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        <span id="toast-msg">Message</span>
    </div>

    <!-- Application Logic -->
    <script src="/static/js/app.js"></script>
</body>
</html>
