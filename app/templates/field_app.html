<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Field Intake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for a native app feel */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-md mx-auto p-6 pb-24">
        <h1 class="text-3xl font-bold text-white mb-8 border-b border-gray-700 pb-4">New Lead</h1>
        
        <form id="intakeForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Homeowner Name</label>
                <input type="text" id="homeowner_name" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Address Line 1</label>
                <input type="text" id="address_line1" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">City</label>
                    <input type="text" id="city" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">State</label>
                    <input type="text" id="state" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Zip</label>
                    <input type="text" id="postal_code" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Phone</label>
                    <input type="tel" id="phone" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
            </div>
            
            <div class="pt-4 border-t border-gray-700">
                <label class="block text-sm font-medium text-gray-400 mb-2">Property Photo (Optional)</label>
                <input type="file" id="photo" accept="image/jpeg, image/png" class="w-full text-lg text-gray-400 file:mr-4 file:py-3 file:px-6 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-white hover:file:bg-gray-600 cursor-pointer">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold text-xl mt-8 active:bg-blue-800 transition-colors shadow-lg">Submit Lead</button>
        </form>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-75 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-xl max-w-sm w-full text-center border border-gray-700 shadow-2xl">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-900 mb-4">
                <svg class="h-10 w-10 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2">Lead Captured</h3>
            <p class="text-gray-400 mb-6">The office has been notified.</p>
            <button onclick="window.location.reload()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold text-lg hover:bg-blue-700">Add Another</button>
        </div>
    </div>

    <script>
        const FIELD_TOKEN = "{{ field_token }}";

        document.getElementById('intakeForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Sending...';
            submitBtn.disabled = true;

            try {
                // 1. Submit Lead Data
                const payload = {
                    homeowner_name: document.getElementById('homeowner_name').value,
                    address_line1: document.getElementById('address_line1').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    postal_code: document.getElementById('postal_code').value,
                    phone: document.getElementById('phone').value,
                    email: null,
                    claim_number: null,
                    insurer_name: null
                };

                const leadResponse = await fetch('/api/field/jobs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-internal-token': FIELD_TOKEN
                    },
                    body: JSON.stringify(payload)
                });

                if (!leadResponse.ok) {
                    const err = await leadResponse.text();
                    throw new Error(`Lead submission failed: ${err}`);
                }

                const leadData = await leadResponse.json();
                const jobId = leadData.job_id;
                
                if (!jobId) {
                    throw new Error('Failed to retrieve a valid Job ID from the server.');
                }

                // 2. Submit Photo if exists
                const photoInput = document.getElementById('photo');
                if (photoInput.files && photoInput.files.length > 0) {
                    const photoFile = photoInput.files[0];
                    if (photoFile.type !== 'image/jpeg' && photoFile.type !== 'image/png') {
                        throw new Error('Photo must be a JPEG or PNG image.');
                    }
                
                    submitBtn.innerText = 'Uploading Photo...';
                    const photoData = new FormData();
                    photoData.append('file', photoFile);

                    const photoResponse = await fetch(`/api/field/jobs/${jobId}/photos`, {
                        method: 'POST',
                        headers: {
                            'x-internal-token': FIELD_TOKEN
                        },
                        body: photoData
                    });

                    if (!photoResponse.ok) {
                        const err = await photoResponse.text();
                        // Non-fatal, but we should alert
                        console.warn(`Photo upload failed: ${err}`);
                    }
                }

                // Show Success
                document.getElementById('successModal').classList.remove('hidden');

            } catch (error) {
                alert(error.message);
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
