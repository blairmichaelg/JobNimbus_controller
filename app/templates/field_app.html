<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Field Intake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for a native app feel */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-md mx-auto p-6 pb-24">
        <h1 class="text-3xl font-bold text-white mb-8 border-b border-gray-700 pb-4">New Lead</h1>
        
        <form id="intakeForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Job Type</label>
                <select id="job_type" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                    <option value="INSURANCE">Insurance Restoration (Contingency)</option>
                    <option value="RETAIL">Retail Cash</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Homeowner Name</label>
                <input type="text" id="homeowner_name" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Address Line 1</label>
                <input type="text" id="address_line1" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">City</label>
                    <input type="text" id="city" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">State</label>
                    <input type="text" id="state" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Zip</label>
                    <input type="text" id="postal_code" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Phone</label>
                    <input type="tel" id="phone" class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:border-blue-500 text-lg" required>
                </div>
            </div>
            
            <div class="pt-4 border-t border-gray-700">
                <label class="block text-sm font-medium text-gray-400 mb-2">Property Photo (Optional)</label>
                <input type="file" id="photo" accept="image/jpeg, image/png" class="w-full text-lg text-gray-400 file:mr-4 file:py-3 file:px-6 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-white hover:file:bg-gray-600 cursor-pointer">
            </div>

            <div id="signatureSection" class="pt-4 border-t border-gray-700">
                <label class="block text-sm font-medium text-gray-400 mb-2">Homeowner Signature (Contingency Agreement)</label>
                <div class="bg-white rounded-lg p-1 border border-gray-600 mb-2 relative">
                    <canvas id="signaturePad" width="380" height="150" class="w-full border-none touch-none rounded bg-white"></canvas>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <button type="button" id="clearBtn" class="text-sm text-red-400 hover:text-red-300 font-semibold px-4 py-2 bg-gray-800 rounded">Clear Signature</button>
                    <button type="button" id="lockBtn" class="text-sm text-green-400 hover:text-green-300 font-semibold px-4 py-2 bg-gray-800 rounded">Lock Signature</button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold text-xl mt-8 active:bg-blue-800 transition-colors shadow-lg">Submit Lead</button>
        </form>
    </div>

    <!-- Loading Modal -->
    <div id="loadingModal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-8 rounded-xl max-w-sm w-full text-center border border-gray-700 shadow-2xl">
            <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-500 mx-auto mb-6"></div>
            <h3 class="text-2xl font-bold text-white mb-2" id="loadingTitle">Processing...</h3>
            <p class="text-gray-400 mb-4" id="loadingText">Please wait while we upload the data.</p>
            <div class="w-full bg-gray-700 rounded-full h-2 mt-4 overflow-hidden">
                <div id="loadingProgress" class="bg-blue-500 h-2 rounded-full transition-all duration-300 ease-out" style="width: 5%"></div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-75 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-8 rounded-xl max-w-sm w-full text-center border border-gray-700 shadow-2xl">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-900 mb-4">
                <svg class="h-10 w-10 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2">Lead Captured</h3>
            <p class="text-gray-400 mb-6">The office has been notified.</p>
            <button onclick="window.location.reload()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold text-lg hover:bg-blue-700">Add Another</button>
        </div>
    </div>

    <script>
        const FIELD_TOKEN = "{{ field_token }}";

        const canvas = document.getElementById('signaturePad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let isSignatureLocked = false;
        
        function initCanvasScale() {
            const rect = canvas.getBoundingClientRect();
            if (rect.width === 0) return; // Hidden
            
            const dpr = window.devicePixelRatio || 1;
            // Only scale if it hasn't been scaled yet for this width
            if (canvas.width !== Math.floor(rect.width * dpr)) {
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
            }
        }
        
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        const startDrawing = (e) => {
            if (isSignatureLocked) return;
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            e.preventDefault();
        };

        const draw = (e) => {
            if (!isDrawing || isSignatureLocked) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        };

        const stopDrawing = () => { isDrawing = false; };

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);
        
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (isSignatureLocked) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        document.getElementById('lockBtn').addEventListener('click', () => {
            const btn = document.getElementById('lockBtn');
            if (!isSignatureLocked) {
                isSignatureLocked = true;
                btn.innerText = '🔒 Locked';
                btn.classList.remove('text-green-400', 'hover:text-green-300');
                btn.classList.add('text-gray-400');
                document.getElementById('clearBtn').classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                isSignatureLocked = false;
                btn.innerText = 'Lock Signature';
                btn.classList.remove('text-gray-400');
                btn.classList.add('text-green-400', 'hover:text-green-300');
                document.getElementById('clearBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        const jobTypeSelect = document.getElementById('job_type');
        const signatureSection = document.getElementById('signatureSection');
        
        jobTypeSelect.addEventListener('change', (e) => {
            if(e.target.value === 'INSURANCE') {
                signatureSection.classList.remove('hidden');
                initCanvasScale();
            } else {
                signatureSection.classList.add('hidden');
            }
        });
        
        // Trigger initial state
        jobTypeSelect.dispatchEvent(new Event('change'));

        document.getElementById('intakeForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Sending...';
            submitBtn.disabled = true;

            try {
                const loadingModal = document.getElementById('loadingModal');
                const loadingTitle = document.getElementById('loadingTitle');
                const loadingProgress = document.getElementById('loadingProgress');

                if (document.getElementById('job_type').value === 'INSURANCE' && !isSignatureLocked) {
                    throw new Error('Please lock the signature before submitting.');
                }

                loadingModal.classList.remove('hidden');
                loadingTitle.innerText = 'Creating Lead...';
                loadingProgress.style.width = '20%';

                // 1. Submit Lead Data
                const payload = {
                    homeowner_name: document.getElementById('homeowner_name').value,
                    address_line1: document.getElementById('address_line1').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    postal_code: document.getElementById('postal_code').value,
                    phone: document.getElementById('phone').value,
                    email: null,
                    claim_number: null,
                    insurer_name: null,
                    job_type: document.getElementById('job_type').value
                };

                const leadResponse = await fetch('/api/field/jobs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-internal-token': FIELD_TOKEN
                    },
                    body: JSON.stringify(payload)
                });

                if (!leadResponse.ok) {
                    const err = await leadResponse.text();
                    throw new Error(`Lead submission failed: ${err}`);
                }

                const leadData = await leadResponse.json();
                const jobId = leadData.job_id;
                
                if (!jobId) {
                    throw new Error('Failed to retrieve a valid Job ID from the server.');
                }

                loadingProgress.style.width = '40%';

                // 2. Submit Photo if exists
                const photoInput = document.getElementById('photo');
                if (photoInput.files && photoInput.files.length > 0) {
                    const photoFile = photoInput.files[0];
                    if (photoFile.type !== 'image/jpeg' && photoFile.type !== 'image/png') {
                        throw new Error('Photo must be a JPEG or PNG image.');
                    }
                
                    loadingTitle.innerText = 'Uploading Photo...';
                    loadingProgress.style.width = '60%';
                    const photoData = new FormData();
                    photoData.append('file', photoFile);

                    const photoResponse = await fetch(`/api/field/jobs/${jobId}/photos`, {
                        method: 'POST',
                        headers: {
                            'x-internal-token': FIELD_TOKEN
                        },
                        body: photoData
                    });

                    if (!photoResponse.ok) {
                        const err = await photoResponse.text();
                        // Non-fatal, but we should alert
                        console.warn(`Photo upload failed: ${err}`);
                    }
                    loadingProgress.style.width = '80%';
                }

                // 3. Submit Contingency Signature (if applicable)
                if (document.getElementById('job_type').value === 'INSURANCE') {
                    loadingTitle.innerText = 'Generating Contract...';
                    loadingProgress.style.width = '90%';
                    const signatureBase64 = canvas.toDataURL('image/png');
                    const sigPayload = {
                        signature_base64: signatureBase64,
                        signer_name: document.getElementById('homeowner_name').value,
                        user_agent: navigator.userAgent
                    };
                    
                    const sigResponse = await fetch(`/api/field/jobs/${jobId}/contingency-sign`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-internal-token': FIELD_TOKEN
                        },
                        body: JSON.stringify(sigPayload)
                    });
                    
                    if (!sigResponse.ok) {
                        const err = await sigResponse.text();
                        throw new Error(`Signature upload failed: ${err}`);
                    }
                }

                loadingProgress.style.width = '100%';
                
                // Show Success
                setTimeout(() => {
                    loadingModal.classList.add('hidden');
                    document.getElementById('successModal').classList.remove('hidden');
                }, 500);

            } catch (error) {
                document.getElementById('loadingModal').classList.add('hidden');
                alert(error.message);
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
