<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-100 h-screen flex flex-col overflow-hidden relative font-mono">
    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full overflow-y-auto p-8 space-y-8">
        <h1 class="text-4xl font-bold text-yellow-400 uppercase tracking-widest text-center border-b border-gray-800 pb-4">Wickham Roofing - Operations & Accounting Brief</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Operations Board -->
            <div class="bg-gray-900 border border-gray-700 rounded p-6 shadow-2xl">
                <h2 class="text-2xl text-blue-400 uppercase font-bold mb-4">Operations (Today)</h2>
                <div class="flex space-x-8 mb-6 text-xl">
                    <div>Deliveries: <span id="ops-deliveries" class="text-white font-bold">0</span></div>
                    <div>Crews Active: <span id="ops-crews" class="text-white font-bold">0</span></div>
                </div>
                <table class="w-full text-left uppercase text-sm">
                    <thead>
                        <tr class="text-gray-500 border-b border-gray-800">
                            <th class="py-2">Job ID</th>
                            <th class="py-2">Supplier</th>
                            <th class="py-2">Status</th>
                        </tr>
                    </thead>
                    <tbody id="ops-table" class="divide-y divide-gray-800">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
            
            <!-- Accounting Board -->
            <div class="bg-gray-900 border border-gray-700 rounded p-6 shadow-2xl">
                <h2 class="text-2xl text-green-400 uppercase font-bold mb-4">Accounting</h2>
                <div class="mb-6 text-xl">
                    <div class="text-gray-400">Supplemented RCV Added</div>
                    <div id="acct-rcv" class="text-5xl text-green-500 font-bold mt-2">$0.00</div>
                </div>
                <div class="mb-4">
                    <span class="text-gray-400">QBO Export Ready: </span>
                    <span id="acct-ready" class="text-white font-bold">0</span>
                </div>
                <button class="bg-green-700 hover:bg-green-600 text-white font-bold py-2 px-4 rounded w-full uppercase tracking-wider mb-6">
                    Export QBO CSV
                </button>
                <table class="w-full text-left uppercase text-sm">
                    <thead>
                        <tr class="text-gray-500 border-b border-gray-800">
                            <th class="py-2">Job ID</th>
                            <th class="py-2">Homeowner</th>
                        </tr>
                    </thead>
                    <tbody id="acct-table" class="divide-y divide-gray-800">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const OFFICE_TOKEN = "{{ office_token }}";

        async function fetchBriefs() {
            try {
                // Fetch Operations
                const opsRes = await fetch('/api/office/operations/brief', { headers: { 'X-Internal-Token': OFFICE_TOKEN } });
                const opsData = await opsRes.json();
                document.getElementById('ops-deliveries').innerText = opsData.deliveries_today;
                document.getElementById('ops-crews').innerText = opsData.crews_today;
                
                const opsTbody = document.getElementById('ops-table');
                opsTbody.innerHTML = '';
                opsData.material_rows.forEach(row => {
                    const color = row.status === 'Ready' ? 'text-green-400' : 'text-yellow-400';
                    opsTbody.innerHTML += `
                        <tr>
                            <td class="py-3 text-gray-300">${row.job_id.substring(0,8)}</td>
                            <td class="py-3 text-white">${row.supplier_name}</td>
                            <td class="py-3 font-bold ${color}">${row.status}</td>
                        </tr>
                    `;
                });

                // Fetch Accounting
                const acctRes = await fetch('/api/office/accounting/brief', { headers: { 'X-Internal-Token': OFFICE_TOKEN } });
                const acctData = await acctRes.json();
                document.getElementById('acct-rcv').innerText = acctData.supplemented_rcv_added;
                document.getElementById('acct-ready').innerText = acctData.qbo_ready_count;
                
                const acctTbody = document.getElementById('acct-table');
                acctTbody.innerHTML = '';
                acctData.rows.forEach(row => {
                    acctTbody.innerHTML += `
                        <tr>
                            <td class="py-3 text-gray-300">${row.job_id.substring(0,8)}</td>
                            <td class="py-3 text-white">${row.name}</td>
                        </tr>
                    `;
                });
            } catch(e) {
                console.error("Brief fetch failed", e);
            }
        }

        // Initial fetch
        fetchBriefs();

        // WebSocket for pure invalidation
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host + '/api/office/ws/office');
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === 'stale' || data.type === 'new_lead' || data.type === 'contingency_signed') {
                // Zero complex state logic. Just re-fetch the absolute truth.
                fetchBriefs();
            }
        };
    </script>
</body>
</html>
